<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #4CAF50;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            width: 350px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        a {
            text-decoration: none;
            color: blue;
        }

        p {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>Login</h2>

    <form>
        <input type="text" placeholder="Enter Username" required>

        <input type="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>

        <p><a href="#">Forgot Password?</a></p>

        <p>Don't have an account? <a href="#">Sign Up</a></p>
    </form>

</div>

</body>
</html>
