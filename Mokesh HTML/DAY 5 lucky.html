<!DOCTYPE html>
<html>
<head>
    <title>Lucky Number Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background-color: #f0f8ff;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }

        #result {
            font-size: 30px;
            color: blue;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>🎲 Lucky Number Generator 🎲</h1>

    <button onclick="generateLuckyNumber()">
        Get Lucky Number
    </button>

    <p id="result">Click the button!</p>

    <script>
        function generateLuckyNumber() {
            let luckyNumber = Math.floor(Math.random() * 100) + 1;
            document.getElementById("result").innerHTML =
                "Your Lucky Number is: " + luckyNumber;
        }
    </script>

</body>
</html>
