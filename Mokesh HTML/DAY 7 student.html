<!DOCTYPE html>
<html>
  <head>
    <title>student registration form</title>
  </head>
  <body>
    <h1 align="center">Hindusthan institue of technology</h1>


    

    <main>
      <h2>Student registration</h2>

      <form>
        <label>Name:</label>
        <input type::"text">
        <br><br>
        <label>DOB :</label>
        <input type:"number" required placeholder=DD/MM/YYYY readonly>
        <br><br>
        <label>Email:</label>
        <input type:"text" required placeholder="enter a valid email">
        <br><br>
        <label>Passw:</label>
        <input type:"text" required placeholder="enter a correct password">
        <br><br>
        <label>Gender</label>
        <input type="radio">
        <label>Male</label>
        <input type="radio">
        <label>Female</label>
        <br><br>
        <label>City</label>
        <select>
          <option value=0>select</option>
           <option value=1>coimbatore</option>
           <option value=2>chennai</option>
           </select>
           <br><br>
           <label>Remarks:</label>
           <textarea rows="1" cols="20"></textarea>
           <br><br>
           <button type="submit">register</button>
           <button type="reset">reset</button>
        


      </form>
    </main>
    
  </body>
</html>
